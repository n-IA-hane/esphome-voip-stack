esphome:
  name: voip-minimal-no-text

esp32:
  board: freenove_esp32_s3_wroom
  variant: esp32s3
  framework:
    type: esp-idf

external_components:
  - source: ../esphome/components
    components: [voip_stack]

logger:

wifi:
  ssid: test-network
  password: test-password

i2s_audio:
  - id: rx_i2s
    i2s_bclk_pin: GPIO9
    i2s_lrclk_pin: GPIO10

microphone:
  - platform: i2s_audio
    id: mic_main
    adc_type: external
    i2s_audio_id: rx_i2s
    i2s_din_pin: GPIO11
    channel: stereo
    sample_rate: 48000
    bits_per_sample: 32bit

voip_stack:
  id: phone
  audio:
    tx:
      sample_rate: 48000
      pcm_format: s16le
      channels: 1
      frame_ms: 10
    rx:
      sample_rate: 48000
      pcm_format: s16le
      channels: 1
      frame_ms: 10
  microphone_source:
    microphone: mic_main
    bits_per_sample: 16
    channels: [1]
